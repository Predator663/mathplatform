# Render Blueprint — deploys backend (Web Service) + frontend (Static Site) + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: mathplatform-db
    databaseName: mathplatform
    user: mathplatform
    

services:
  # ── Django API ─────────────────────────────────────────────────────────────
  - type: web
    name: mathplatform-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn mathapi.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: mathapi.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mathplatform-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "mathplatform-api.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      # Once frontend is deployed, replace with:
      # - key: CORS_ALLOWED_ORIGINS
      #   value: "https://mathplatform-frontend.onrender.com"
      # - key: CORS_ALLOW_ALL_ORIGINS
      #   value: "False"

  # ── React Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: mathplatform-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://mathplatform-api.onrender.com"
    routes:
      # SPA fallback — send all non-asset routes to index.html
      - type: rewrite
        source: /*
        destination: /index.html
